<!DOCTYPE html>
<html>

<head>

<title>KPL Admin Panel</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<script>

if(localStorage.getItem("adminLogin") !== "true"){

    window.location.href = "admin-login.html";

}

</script>



<h1>⚽ KPL Admin Panel</h1>





<!-- ==========================
     FIXTURE MANAGEMENT
========================== -->


<h2>Add New Fixture</h2>


<select id="homeTeam">

<option value="">
Select Home Team
</option>

</select>



<select id="awayTeam">

<option value="">
Select Away Team
</option>

</select>




<input 
id="matchDate"
type="date"
>




<input 
id="matchTime"
type="time"
>




<input 
id="stage"
placeholder="Stage"
>




<button onclick="addFixture()">

Add Fixture

</button>





<hr>



<h2>Update Fixtures</h2>


<div id="adminFixtures"></div>







<!-- ==========================
     POINTS TABLE
========================== -->


<hr>


<h2>Points Table</h2>


<button onclick="updatePointsTable()">

Update Points Table

</button>







<!-- ==========================
     TEAM MANAGEMENT
========================== -->


<hr>


<h2>Team Management</h2>




<input 
id="teamName"
placeholder="Team Name"
>



<input 
id="captainName"
placeholder="Captain Name"
>



<input 
id="ownerName"
placeholder="Owner Name"
>



<input 
id="purseAmount"
type="number"
placeholder="Purse Amount"
>




<select id="teamPot">


<option value="Pot 1">

Pot 1

</option>


<option value="Pot 2">

Pot 2

</option>


<option value="Pot 3">

Pot 3

</option>


</select>




<button onclick="addTeam()">

Add Team

</button>





<div id="teamsAdminContainer"></div>







<!-- ==========================
     SCRIPTS
========================== -->


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script src="js/supabase.js"></script>


<script src="js/updatePoints.js"></script>


<script src="js/admin.js"></script>


<script src="js/adminTeams.js"></script>



</body>

</html>
