<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KPL Admin Panel</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<script>

if(localStorage.getItem("adminLogin") !== "true"){

    window.location.href = "admin-login.html";

}

</script>



<header>

<h1>⚽ KPL Admin Panel</h1>

</header>





<!-- =========================
     FIXTURE MANAGEMENT
========================= -->


<section class="admin-section">


<h2>➕ Add New Fixture</h2>



<select id="homeTeam">

<option value="">
Select Home Team
</option>

</select>



<select id="awayTeam">

<option value="">
Select Away Team
</option>

</select>



<input 
id="matchDate"
type="date"
>



<input 
id="matchTime"
type="time"
>



<input 
id="stage"
placeholder="Match Stage"
>



<button onclick="addFixture()">

Add Fixture

</button>



</section>






<hr>





<section class="admin-section">


<h2>🏟 Update Fixtures</h2>


<div id="adminFixtures"></div>



</section>







<!-- =========================
     POINTS TABLE
========================= -->


<hr>



<section class="admin-section">


<h2>🏆 Points Table</h2>



<button onclick="updatePointsTable()">

Update Automatically

</button>



<br><br>



<div id="adminPointsTable"></div>



</section>









<!-- =========================
     TEAM MANAGEMENT
========================= -->


<hr>



<section class="admin-section">


<h2>👥 Team Management</h2>




<input 
id="teamName"
placeholder="Team Name"
>



<input 
id="captainName"
placeholder="Captain Name"
>



<input 
id="ownerName"
placeholder="Owner Name"
>



<input 
id="purseAmount"
type="number"
placeholder="Purse Amount"
>




<select id="teamPot">


<option value="Pot 1">

Pot 1

</option>


<option value="Pot 2">

Pot 2

</option>


<option value="Pot 3">

Pot 3

</option>


</select>




<button onclick="addTeam()">

Add Team

</button>




<div id="teamsAdminContainer"></div>



</section>









<!-- =========================
     PLAYER MANAGEMENT
========================= -->


<hr>



<section class="admin-section">


<h2>⚽ Registered Players</h2>




<input

id="playerSearch"

placeholder="Search Player"

onkeyup="searchPlayers()"

>




<div id="adminPlayers"></div>



</section>








<!-- =========================
     SCRIPTS
========================= -->


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script src="js/supabase.js"></script>



<script src="js/updatePoints.js"></script>



<script src="js/admin.js"></script>



<script src="js/adminTeams.js"></script>



<script src="js/adminPlayers.js"></script>



<script src="js/adminPoints.js"></script>



</body>

</html>
