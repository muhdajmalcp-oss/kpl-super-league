====================== -->



<section class="auction-section">



<h2>

</h2>

id="playerSearch"

class="search-box"

onkeyup="searchPlayers()"

>





<div id="auctionPlayers"></div>



</section>

class="search-box"

placeholder="Search sold players..."

onkeyup="searchSoldPlayers()"

>





<div id="soldPlayers"></div>



</section>
